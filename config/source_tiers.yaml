#
# source_tiers.yaml — seeded, version-controlled source-trust tier list.
#
# This is the ONLY place source trust is decided. No learned model — every
# classification traces back to one explicit rule below (the "boring, auditable"
# choice; the learned alternative is the clever trap we refuse).
#
# Each rule has:
#   id:        stable identifier, recorded in the audit trail
#   tier:      "low" | "high"
#   match:     "domain" (substring of the host) or "regex" (against the full URL)
#   patterns:  list of substrings or regexes
#   note:      human-readable rationale
#
# Evaluation order: HIGH rules first, then LOW rules, first match wins. Anything
# unmatched stays "unknown" and is treated cautiously by the ranking step.
# Edit this file to correct misclassifications — no code change required.

high:
  - id: forum-reddit
    match: domain
    patterns: ["reddit.com"]
    note: Topic-specific subreddits carry lived experience and independent reports.
  - id: forum-stackexchange
    match: domain
    patterns: ["stackexchange.com", "stackoverflow.com", "superuser.com"]
    note: Q&A communities with voting and independent answers.
  - id: forum-generic
    match: regex
    patterns:
      - "(?i)//(forum|forums|community|community-forum)\\."
      - "(?i)/(forum|forums|community|threads|viewtopic)"
    note: Specialist forums and community boards about the topic.
  - id: forum-known-communities
    match: domain
    patterns:
      - "hackernews"
      - "news.ycombinator.com"
      - "lobste.rs"
      - "discourse"
    note: Established discussion communities.

low:
  - id: marketplace
    match: domain
    patterns:
      - "amazon."
      - "bol.com"
      - "ebay."
      - "aliexpress."
      - "walmart.com"
      - "coolblue."
    note: Webshops optimise for conversion; reviews are gameable and commercial.
  - id: manufacturer-store
    match: regex
    patterns:
      - "(?i)/(shop|store|product|products|buy|cart|checkout)(/|$|\\?)"
    note: Manufacturer/seller pages present marketing, not lived experience.
  - id: affiliate-toplist
    match: regex
    patterns:
      - "(?i)(best-|top-?\\d+|top-?ten|-review-|buying-guide|/reviews?/)"
      - "(?i)(bestof|best-of|vergelijk|beste-)"
    note: Top-N lists and buying guides are the dominant affiliate/SEO format.
  - id: sponsored-seo
    match: regex
    patterns:
      - "(?i)(sponsored|affiliate|utm_|/deals?/|/coupon)"
    note: Sponsored/affiliate/SEO-tagged URLs.
